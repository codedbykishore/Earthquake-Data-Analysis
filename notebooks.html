<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.5" />
    <title>Notebooks - Earthquake Data Analysis</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .notebook-container {
        min-height: calc(100vh - 200px);
        padding: 2rem 0;
      }

      .content-switcher {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }

      .switcher-btn {
        padding: 0.75rem 2rem;
        background: linear-gradient(145deg, #121417, #1a1d22);
        color: #e9ecef;
        border: 2px solid transparent;
        border-radius: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      }

      .switcher-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(97, 218, 251, 0.3);
        border-color: #61dafb;
      }

      .switcher-btn.active {
        background: linear-gradient(145deg, #61dafb, #4db8e8);
        color: #0b0d10;
        border-color: #61dafb;
        box-shadow: 0 0 20px rgba(97, 218, 251, 0.5);
      }

      .notebook-content {
        display: none;
        background: linear-gradient(145deg, #121417, #1a1d22);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        overflow: auto;
      }

      .notebook-content.active {
        display: block;
        animation: fadeIn 0.3s ease-in;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .notebook-embed {
        background: rgba(11, 13, 16, 0.9);
        border: 1px solid rgba(97, 218, 251, 0.15);
        border-radius: 12px;
        padding: 1rem;
        overflow: auto;
        min-height: 85vh;
      }

      .notebook-embed .gist table {
        margin-bottom: 0;
      }

      .notebook-embed .render-container {
        min-height: 80vh;
      }

      .notebook-embed iframe.render-viewer,
      .notebook-embed iframe.render-viewer-fatal,
      .notebook-embed iframe.render-viewer-error {
        width: 100%;
        min-height: 85vh;
        border: none;
      }

      .notebook-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .notebook-header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #61dafb;
        text-shadow: 0 0 15px rgba(97, 218, 251, 0.5);
        margin-bottom: 0.5rem;
      }

      .notebook-header p {
        font-size: 1.1rem;
        color: #cfd8dc;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <header class="navbar navbar-expand-lg navbar-dark shadow-sm">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" href="index.html">Earthquake Analysis</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#features">Features</a></li>
            <li class="nav-item"><a class="nav-link text-nowrap" href="index.html#ml-models">ML Models</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#dashboards">Dashboards</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#datasets">Datasets</a></li>
            <li class="nav-item"><a class="nav-link active" href="notebooks.html">Notebooks</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#team">Team</a></li>
          </ul>
        </div>
      </div>
    </header>

    <main>
      <div class="container notebook-container">
        <!-- Header -->
        <div class="notebook-header">
          <h1>Interactive Notebooks</h1>
          <p>Explore our Jupyter notebooks for in-depth analysis and modeling</p>
        </div>

        <!-- Content Switcher -->
        <div class="content-switcher">
          <button class="switcher-btn active" onclick="switchNotebook(event, 'cdi-mmi')">
            <i class="bi bi-graph-up"></i> CDI & MMI Prediction
          </button>
          <button class="switcher-btn" onclick="switchNotebook(event, 'alert-level')">
            <i class="bi bi-exclamation-triangle"></i> Alert Level Evaluation
          </button>
        </div>

        <!-- Notebook Content: CDI & MMI -->
        <div id="cdi-mmi" class="notebook-content active">
          <div class="notebook-embed">
            <div class="gist-wrapper">
              <script src="https://gist.github.com/heyitsgautham/bb697ea0112838952bd56bca8bc9f4bf.js"></script>
            </div>
          </div>
        </div>

        <!-- Notebook Content: Alert Level -->
        <div id="alert-level" class="notebook-content">
          <div class="notebook-embed">
            <div class="gist-wrapper">
              <script src="https://gist.github.com/heyitsgautham/692deb8316abbd4bab12fda9b49eabff.js"></script>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4" style="background: linear-gradient(90deg, #0d1117, #121417); margin-top: 3rem;">
      <p>&copy; 2025 QuakeVision. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Content Switcher Script -->
    <script>
      function switchNotebook(evt, notebookId) {
        // Hide all notebook contents
        const contents = document.querySelectorAll('.notebook-content');
        contents.forEach(content => {
          content.classList.remove('active');
        });

        // Remove active class from all buttons
        const buttons = document.querySelectorAll('.switcher-btn');
        buttons.forEach(btn => {
          btn.classList.remove('active');
        });

        // Show selected notebook content
        document.getElementById(notebookId).classList.add('active');

        // Add active class to clicked button
        if (evt && evt.currentTarget) {
          evt.currentTarget.classList.add('active');
        }
      }
    </script>
  </body>
</html>
